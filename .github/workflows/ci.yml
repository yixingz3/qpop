name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_ots_roundtrip:
        description: >-
          Also run the live OpenTimestamps external-anchor round-trip (real network call to
          the public calendar servers). Off by default: calendar-server reachability is
          outside this repo's control, so it's excluded from the required push/PR triggers
          to keep required CI deterministic.
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Tests (ledger + anchor + schemas)
        run: python -m pytest -q

      - name: Fixtures validate against schemas
        run: python repro/validate_samples.py

      - name: Tamper-evidence demo
        run: python repro/tamper_demo.py

      - name: Anchor round-trip (write + drift-detect)
        run: |
          python scripts/qpop.py anchor data/synthetic/qpop_ledger_sample.jsonl
          python scripts/qpop.py verify-anchor data/synthetic/qpop_ledger_sample.jsonl

  package:
    name: Build, install, smoke-test the package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build + twine check + install wheel + run console script
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m pip install dist/*.whl
          forward-qpop --help
          forward-qpop verify data/synthetic/qpop_ledger_sample.jsonl

  external-anchor-live:
    name: External anchor -- live OpenTimestamps round-trip (manual, non-blocking)
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_ots_roundtrip
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with the anchor extra (opentimestamps-client)
        run: python -m pip install --upgrade pip -e ".[anchor]" pytest

      - name: Live external-anchor round-trip against a scratch ledger
        run: |
          cp data/synthetic/qpop_ledger_sample.jsonl /tmp/live_ledger.jsonl
          python scripts/qpop.py anchor /tmp/live_ledger.jsonl
          python scripts/qpop.py anchor external /tmp/live_ledger.jsonl --method ots
          python scripts/qpop.py verify-external /tmp/live_ledger.jsonl
          cat /tmp/live_ledger.jsonl.external-anchor.json

      - name: Live network test (QPOP_TEST_LIVE_OTS=1)
        env:
          QPOP_TEST_LIVE_OTS: "1"
        run: python -m pytest -q tests/test_external_anchor.py -k live -v
