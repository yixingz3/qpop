name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Tests (ledger + anchor + schemas)
        run: python -m pytest -q

      - name: Fixtures validate against schemas
        run: python repro/validate_samples.py

      - name: Tamper-evidence demo
        run: python repro/tamper_demo.py

      - name: Anchor round-trip (write + drift-detect)
        run: |
          python scripts/qpop.py anchor data/synthetic/qpop_ledger_sample.jsonl
          python scripts/qpop.py verify-anchor data/synthetic/qpop_ledger_sample.jsonl
